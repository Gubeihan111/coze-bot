<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>智能体对话 · 图标版</title>
    <!-- 引入 Font Awesome 6 免费图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .chat-header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            padding: 20px 24px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-header i {
            font-size: 1.8rem;
            color: #667eea;
            background: white;
            padding: 8px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .chat-header h2 {
            font-weight: 600;
            font-size: 1.4rem;
            color: #333;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #f9fafc;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            animation: fadeIn 0.3s ease;
        }
        .message.user {
            justify-content: flex-end;
        }
        .message.bot {
            justify-content: flex-start;
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
            flex-shrink: 0;
        }
        .user .avatar {
            background: #667eea;
            order: 1; /* 让用户头像在右侧 */
        }
        .bot .avatar {
            background: #10b981;
        }
        .bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 1rem;
            word-wrap: break-word;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: relative;
        }
        .user .bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .bot .bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(0,0,0,0.08);
        }
        .timestamp {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }
        .input-area {
            background: white;
            padding: 20px 24px;
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #e0e0e0;
            border-radius: 40px;
            outline: none;
            font-size: 1rem;
            transition: all 0.2s;
            background: #f8fafc;
        }
        .input-area input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
            background: white;
        }
        .input-area button {
            background: #667eea;
            color: white;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }
        .input-area button:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }
        .input-area button:active {
            transform: scale(0.95);
        }
        .input-area button i {
            font-size: 1.5rem;
            color: white;
        }
        /* 滚动条美化 */
        .messages-area::-webkit-scrollbar {
            width: 6px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 10px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 正在输入动画 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            background: #e4e6eb;
            border-radius: 20px;
            width: fit-content;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <i class="fas fa-robot"></i>
            <h2>智能体小助手</h2>
        </div>
        <div class="messages-area" id="chat">
            <!-- 消息会动态插入到这里 -->
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入你的问题..." autofocus>
            <button onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        // 用户ID管理
        let userId = localStorage.getItem('userId');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('userId', userId);
        }

        const chatDiv = document.getElementById('chat');
        const userInput = document.getElementById('userInput');
        let isLoading = false;

        // 初始欢迎消息
        window.onload = function() {
            appendMessage('bot', '你好！我是你的智能体助手，有什么可以帮你的吗？');
        };

        async function sendMessage() {
            const question = userInput.value.trim();
            if (!question || isLoading) return;

            appendMessage('user', question);
            userInput.value = '';

            const loadingId = showTypingIndicator();
            isLoading = true;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, question })
                });
                const data = await response.json();
                removeTypingIndicator(loadingId);
                if (data.reply) {
                    appendMessage('bot', data.reply);
                } else {
                    appendMessage('bot', '抱歉，我没有理解。错误：' + (data.error || '未知错误'));
                }
            } catch (err) {
                removeTypingIndicator(loadingId);
                appendMessage('bot', '网络连接失败，请稍后重试。');
            } finally {
                isLoading = false;
            }
        }

        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typing-' + Date.now();
            typingDiv.innerHTML = `
                <div class="avatar"><i class="fas fa-robot"></i></div>
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatDiv.appendChild(typingDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            return typingDiv.id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;

            // 创建头像
            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'avatar';
            if (sender === 'user') {
                avatarDiv.innerHTML = '<i class="fas fa-user"></i>';
            } else {
                avatarDiv.innerHTML = '<i class="fas fa-robot"></i>';
            }

            // 创建气泡
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble';
            bubbleDiv.textContent = text;

            // 可选时间戳
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            const timeSpan = document.createElement('div');
            timeSpan.className = 'timestamp';
            timeSpan.textContent = time;
            bubbleDiv.appendChild(timeSpan);

            // 组装：用户消息（头像在右），机器人消息（头像在左）
            if (sender === 'user') {
                msgDiv.appendChild(bubbleDiv);
                msgDiv.appendChild(avatarDiv);
            } else {
                msgDiv.appendChild(avatarDiv);
                msgDiv.appendChild(bubbleDiv);
            }

            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
